[workspace]
name = "kano-git-master-skill"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
git = "*"
nodejs = ">=22,<23"
python = ">=3.12,<3.13"

[target.linux-64.dependencies]
bash = "*"

[target.osx-64.dependencies]
bash = "*"

[target.osx-arm64.dependencies]
bash = "*"

# =============================================================================
# REPO-SPECIFIC PIXI EXTENSIONS (repo root)
# =============================================================================
# Common native build / test / report / bootstrap flows now live in the canonical
# shared manifest at `src/cpp/shared/infra/pixi.toml`.
#
# Prefer:
#   cd src/cpp/shared/infra && pixi run <task>
#   pixi run <task>
#
# Repo-root wrapper tasks must `cd` into `src/cpp/shared/infra` instead of
# forwarding with `--manifest-path` for build/test/report lanes. Some shared
# CMake preset flows resolve against the current working directory and expect
# `src/cpp/CMakePresets.json`, not `src/cpp/shared/infra/CMakePresets.json`.
#
# Keep only repo-specific shell/docs/acceptance tasks here, plus safe repo-root
# wrapper tasks for the shared infra manifest.
# =============================================================================

[tasks]
build-debug = "cd src/cpp/shared/infra && pixi run build-debug"
build-release = "cd src/cpp/shared/infra && pixi run build-release"
build = "cd src/cpp/shared/infra && pixi run build"
rebuild = "cd src/cpp/shared/infra && pixi run rebuild"
quick-test = "cd src/cpp/shared/infra && pixi run quick-test"
test = "cd src/cpp/shared/infra && pixi run test"
full-test = "cd src/cpp/shared/infra && pixi run full-test"
test-report = "cd src/cpp/shared/infra && pixi run test-report"
coverage-report = "cd src/cpp/shared/infra && pixi run coverage-report"
coverage-all = "cd src/cpp/shared/infra && pixi run coverage-all"
gather-reports = "cd src/cpp/shared/infra && pixi run gather-reports"
pgo-gather = "cd src/cpp/shared/infra && pixi run pgo-gather"
pgo-rebuild = "cd src/cpp/shared/infra && pixi run pgo-rebuild"
pgo-gather-with-coverage = "cd src/cpp/shared/infra && pixi run pgo-gather-with-coverage"
profile-run-manifest = "cd src/cpp/shared/infra && pixi run profile-run-manifest"
ci-linux-build = "cd src/cpp/shared/infra && pixi run ci-linux-build"
ci-linux-quick-test = "cd src/cpp/shared/infra && pixi run ci-linux-quick-test"
ci-linux-test-report = "cd src/cpp/shared/infra && pixi run ci-linux-test-report"
ci-linux-coverage-all = "cd src/cpp/shared/infra && pixi run ci-linux-coverage-all"
ci-linux-validate = "cd src/cpp/shared/infra && pixi run ci-linux-validate"
ci-linux-export = "cd src/cpp/shared/infra && pixi run ci-linux-export"

acceptance-quickstart = "bash src/shell/test/acceptance-quickstart-commit-push.sh"
acceptance-commit-plan-first = "bash src/shell/test/acceptance-commit-plan-first.sh"
acceptance-ignore-plan = "bash src/shell/test/acceptance-ignore-plan.sh"
acceptance-pixi-bootstrap-parity = "bash src/shell/test/acceptance-pixi-bootstrap-parity.sh"
smoke-bdd-reporting = "bash src/shell/test/smoke-bdd-reporting.sh"
docs = "bash src/shell/docs/build-and-deploy.sh"
docs-ci = "bash src/shell/docs/build-and-deploy.sh --ci $(pwd)"
