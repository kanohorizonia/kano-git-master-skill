[workspace]
name = "kano-git-master-skill"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
git = "*"
nodejs = ">=22,<23"
python = ">=3.12,<3.13"

[target.linux-64.dependencies]
bash = "*"

[target.osx-64.dependencies]
bash = "*"

[target.osx-arm64.dependencies]
bash = "*"

# =============================================================================
# REPO-SPECIFIC PIXI EXTENSIONS (repo root)
# =============================================================================
# Common native build / test / report / bootstrap flows now live in the canonical
# shared manifest at `src/cpp/shared/infra/pixi.toml`.
#
# Prefer:
#   pixi run --manifest-path src/cpp/shared/infra/pixi.toml <task>
#   cd src/cpp/shared/infra && pixi run <task>
#
# Keep only repo-specific shell/docs/acceptance tasks here.
# =============================================================================

[tasks]
quick-test = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml quick-test"
test = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml test"
full-test = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml full-test"
test-report = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml test-report"
coverage-report = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml coverage-report"
coverage-all = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml coverage-all"
gather-reports = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml gather-reports"
pgo-gather = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml pgo-gather"
pgo-rebuild = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml pgo-rebuild"
pgo-gather-with-coverage = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml pgo-gather-with-coverage"
profile-run-manifest = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml profile-run-manifest"
ci-linux-build = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml ci-linux-build"
ci-linux-quick-test = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml ci-linux-quick-test"
ci-linux-test-report = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml ci-linux-test-report"
ci-linux-coverage-all = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml ci-linux-coverage-all"
ci-linux-export = "pixi run --manifest-path src/cpp/shared/infra/pixi.toml ci-linux-export"

acceptance-quickstart = "bash src/shell/test/acceptance-quickstart-commit-push.sh"
acceptance-commit-plan-first = "bash src/shell/test/acceptance-commit-plan-first.sh"
acceptance-ignore-plan = "bash src/shell/test/acceptance-ignore-plan.sh"
acceptance-pixi-bootstrap-parity = "bash src/shell/test/acceptance-pixi-bootstrap-parity.sh"
smoke-bdd-reporting = "bash src/shell/test/smoke-bdd-reporting.sh"
docs = "bash src/shell/docs/build-and-deploy.sh"
docs-ci = "bash src/shell/docs/build-and-deploy.sh --ci $(pwd)"
