# Development build (Debug preset - fast iteration)
build-debug = "bash src/cpp/scripts/macos/ninja-clang-arm64-debug.sh"

# Release build (optimized)
build-release = "bash src/cpp/scripts/macos/ninja-clang-arm64-release.sh"

# Coverage workflow (CI-ready)
build-coverage = "bash src/cpp/scripts/macos/ninja-clang-arm64-coverage-build.sh"
test-coverage = "bash src/cpp/scripts/macos/ninja-clang-arm64-coverage-run.sh"
report-coverage = "bash src/cpp/scripts/macos/ninja-clang-arm64-coverage-report.sh"

# Full coverage workflow: build + test + report
coverage-all = "bash src/cpp/scripts/macos/ninja-clang-arm64-coverage-build.sh && bash src/cpp/scripts/macos/ninja-clang-arm64-coverage-run.sh && bash src/cpp/scripts/macos/ninja-clang-arm64-coverage-report.sh"

# Tests
quick-test = "bash src/cpp/code/tests/run_tests.sh macos-ninja-clang-arm64-release"
full-test = "bash src/cpp/code/tests/run_tests.sh macos-ninja-clang-arm64-release --with-e2e"
