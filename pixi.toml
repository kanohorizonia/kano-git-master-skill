[workspace]
name = "kano-git-master-skill"
channels = ["conda-forge"]
platforms = ["win-64", "linux-64", "osx-64", "osx-arm64"]

[dependencies]
cmake = ">=3.21"
git = "*"
ninja = "*"
ripgrep = "*"

[target.linux-64.dependencies]
bash = "*"

[target.osx-64.dependencies]
bash = "*"

[target.osx-arm64.dependencies]
bash = "*"

# =============================================================================
# Universal tasks (work on all platforms)
# =============================================================================
[tasks]
env-summary = "git --version && cmake --version && ninja --version"
package-reports = "bash src/cpp/scripts/common/package-reports-with-skill.sh"
profile-default = "bash src/cpp/scripts/stages/profile.sh default && bash src/cpp/scripts/stages/profile-report.sh default"
profile-launchers = "bash src/cpp/scripts/stages/profile.sh launchers && bash src/cpp/scripts/stages/profile-report.sh launchers"
profile-unity = "bash src/cpp/scripts/stages/profile.sh unity && bash src/cpp/scripts/stages/profile-report.sh unity"
profile-pgo = "bash src/cpp/scripts/stages/profile.sh pgo && bash src/cpp/scripts/stages/profile-report.sh pgo"

# Acceptance tests (cross-platform)
acceptance-quickstart = "bash src/shell/test/acceptance-quickstart-commit-push.sh"
acceptance-commit-plan-first = "bash src/shell/test/acceptance-commit-plan-first.sh"

# Docs site (cross-platform)
docs = "bash src/shell/docs/build-and-deploy.sh"
docs-ci = "bash src/shell/docs/build-and-deploy.sh --ci $(pwd)"

# =============================================================================
# Windows-specific (win-64)
# =============================================================================
[target.win-64.tasks]
# Bootstrap
bootstrap-system = "bash src/cpp/shared/infra/scripts/platform/win64/prerequisite.ps1"

# Development build (Debug preset - fast iteration)
build-debug = "bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-debug.sh"

# Release build (optimized)
build-release = "bash src/cpp/scripts/self/build.sh"

# Coverage workflow (CI-ready)
build-coverage = "bash src/cpp/scripts/stages/coverage-build.sh"
test-coverage = "bash src/cpp/scripts/stages/coverage-gather.sh"
report-coverage = "bash src/cpp/scripts/stages/coverage-report.sh"
report-coverage-opencppcoverage = "bash src/cpp/shared/infra/scripts/platform/win64/ninja-msvc-coverage-build.sh"
skill-report-coverage = "bash src/cpp/scripts/stages/coverage-report.sh"
skill-report-coverage-opencppcoverage = "bash src/cpp/scripts/stages/coverage-report.sh opencppcoverage"
test-report = "bash src/cpp/scripts/stages/test-report.sh"
pgo-rebuild = "bash src/cpp/scripts/workflows/pgo-rebuild.sh"

# Full coverage workflow: build + test + report
coverage-all = "bash src/cpp/scripts/workflows/coverage-all.sh"

# Tests
quick-test = "bash src/cpp/code/tests/run_tests.sh windows-ninja-msvc-release"
full-test = "bash src/cpp/code/tests/run_tests.sh windows-ninja-msvc-release --with-e2e"

# =============================================================================
# Linux-specific (linux-64)
# =============================================================================
[target.linux-64.tasks]
