name: KanoAgentSkills / Release Gates

run-name: ${{ github.event.inputs.jenkins_build_name && format('Jenkins_{0}_{1}', github.event.inputs.jenkins_stage_name || 'release-gates', github.event.inputs.jenkins_build_name) || format('GitHub_release-gates_{0}_{1}_{2}', github.event.repository.name, github.ref_name, github.run_number) }}

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "scripts/**"
      - ".githooks/**"
      - "docs/**"
      - "README.md"
      - "SKILL.md"
      - ".gitattributes"
      - ".gitignore"
      - "pixi.toml"
      - "src/cpp/shared/infra/pixi.toml"
      - ".kano/**"
      - "VERSION"
      - ".github/workflows/release-gates.yml"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - ".githooks/**"
      - "docs/**"
      - "README.md"
      - "SKILL.md"
      - ".gitattributes"
      - ".gitignore"
      - "pixi.toml"
      - "src/cpp/shared/infra/pixi.toml"
      - ".kano/**"
      - "VERSION"
      - ".github/workflows/release-gates.yml"
  workflow_dispatch:
    inputs:
      jenkins_build_name:
        description: Human-readable Jenkins build name for GitHub Actions run lists.
        required: false
        default: ""
        type: string
      jenkins_stage_name:
        description: Jenkins stage/job slug to show in the GitHub Actions run name.
        required: false
        default: release-gates
        type: string

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Shell Quality Gate
  # ─────────────────────────────────────────────────────────────────────────────
  quality-gate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Run shell-only pre-commit quality gate
        shell: bash
        run: src/shell/test/pre-commit-quality-gate.sh

  # ─────────────────────────────────────────────────────────────────────────────
  # Native Build Jobs (existing)
  # ─────────────────────────────────────────────────────────────────────────────
  build-native:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/windows-ninja-msvc/release/*
            archive_name: kano-git-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/linux-ninja-gcc/release/*
            archive_name: kano-git-linux-x64.tar.gz
          - name: macos-x64
            os: macos-13
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/macos-ninja-clang-x64/release/*
            archive_name: kano-git-macos-x64.tar.gz
          - name: macos-arm64
            os: macos-14
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/macos-ninja-clang-arm64/release/*
            archive_name: kano-git-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Install shared infra Pixi environment
        run: pixi install --manifest-path src/cpp/shared/infra/pixi.toml

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build native binary
        run: pixi run --manifest-path src/cpp/shared/infra/pixi.toml build

      - name: Package CI archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ci-assets/root/bin
          cp -R ${{ matrix.binary_glob }} ci-assets/root/bin/
          tar -czf ci-assets/${{ matrix.archive_name }} -C ci-assets/root .

      - name: Package CI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci-assets/root/bin | Out-Null
          Copy-Item -Path src/cpp/out/bin/windows-ninja-msvc/release/* -Destination ci-assets/root/bin -Recurse -Force
          Compress-Archive -Path ci-assets/root/* -DestinationPath ci-assets/${{ matrix.archive_name }} -Force

      - name: Upload native build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kano-git-${{ matrix.name }}
          path: ci-assets/${{ matrix.archive_name }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Coverage Build Jobs (new)
  # ─────────────────────────────────────────────────────────────────────────────
  build-coverage:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    needs: quality-gate
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: coverage-macos-x64
            report_slug: macos-x64
            os: macos-13
            shell: bash
            configure_preset: macos-ninja-clang-coverage
            build_preset: macos-ninja-clang-coverage-debug
            test_target: kano_git_tui_tests
            # macOS uses llvm-cov from Xcode
            llvm_cov_path: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-macos-arm64
            report_slug: macos-arm64
            os: macos-14
            shell: bash
            configure_preset: macos-ninja-clang-arm64-coverage
            build_preset: macos-ninja-clang-arm64-coverage-debug
            test_target: kano_git_tui_tests
            llvm_cov_path: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-linux-x64
            report_slug: linux-x64
            os: ubuntu-latest
            shell: bash
            configure_preset: linux-ninja-clang-coverage
            build_preset: linux-ninja-clang-coverage-debug
            test_target: kano_git_tui_tests
            # Linux: install llvm-cov via apt
            llvm_cov_path: /usr/lib/llvm-18/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-windows-x64
            report_slug: windows-x64
            os: windows-latest
            shell: pwsh
            configure_preset: windows-ninja-msvc-coverage
            build_preset: windows-ninja-msvc-coverage-debug
            test_target: kano_git_tui_tests.exe
            # Windows: uses MSVC /PROFILE, processed by Microsoft.CodeCoverage.Console
            coverage_tool: msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Install shared infra Pixi environment
        shell: bash
        run: pixi install --manifest-path src/cpp/shared/infra/pixi.toml

      - name: Checkout kano-cpp-test-skill
        uses: actions/checkout@v4
        with:
          repository: kanohorizonia/kano-cpp-test-skill
          ref: main
          path: _tools/kano-cpp-test-skill

      # ─── Linux: Install LLVM for llvm-cov ───────────────────────────────────
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-tools clang-18

      # ─── macOS: Ensure Xcode tools available ─────────────────────────────────
      - name: Setup Xcode CLI tools (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      # ─── Windows: Install .NET SDK (for Microsoft.CodeCoverage.Console) ───────
      - name: Setup .NET SDK (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ─── Windows: Locate Microsoft.CodeCoverage.Console ──────────────────────
      - name: Locate Microsoft.CodeCoverage.Console (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\2022\Professional\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\18\Enterprise\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\18\Professional\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\18\Community\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe'
          )
          $tool = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tool) {
            throw 'Microsoft.CodeCoverage.Console.exe not found on runner'
          }
          "KOG_WINDOWS_COVERAGE_TOOL=$tool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Locate or install OpenCppCoverage (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe',
            'C:\tools\OpenCppCoverage\OpenCppCoverage.exe'
          )
          $tool = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tool) {
            choco install OpenCppCoverage -y --no-progress
            $tool = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $tool) {
            throw 'OpenCppCoverage.exe not found on runner'
          }
          "KOG_OPENCPPCOVERAGE_EXE=$tool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ─── Configure Coverage Build ─────────────────────────────────────────────
      - name: Configure coverage build
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          cd src/cpp
          pixi run --manifest-path shared/infra/pixi.toml cmake --preset ${{ matrix.configure_preset }}

      # ─── Build ─────────────────────────────────────────────────────────────
      - name: Build coverage binary
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          cd src/cpp
          pixi run --manifest-path shared/infra/pixi.toml cmake --build --preset ${{ matrix.build_preset }}

      # ─── Run Tests + Coverage via shared skill (Windows Microsoft) ─────────
      - name: Run tests and Microsoft coverage report (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          KANO_REPORT_SLUG: ${{ matrix.report_slug }}
          KOG_REPORT_ROOT: ${{ github.workspace }}
          KOG_WINDOWS_COVERAGE_TOOL: ${{ env.KOG_WINDOWS_COVERAGE_TOOL }}
          KANO_CPP_TEST_SKILL_ROOT: ${{ github.workspace }}/_tools/kano-cpp-test-skill
        run: |
          bash ./src/cpp/shared/infra/scripts/lib/coverage_report.sh report ${{ matrix.configure_preset }} ${{ matrix.test_target }}

      # ─── Run Tests + Coverage via shared skill (Linux LLVM) ──────────────────
      - name: Run tests and LLVM coverage report (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          KANO_REPORT_SLUG: ${{ matrix.report_slug }}
          KOG_REPORT_ROOT: ${{ github.workspace }}
          KANO_CPP_TEST_SKILL_ROOT: ${{ github.workspace }}/_tools/kano-cpp-test-skill
        run: |
          export PATH="${{ matrix.llvm_cov_path }}:$PATH"
          bash ./src/cpp/shared/infra/scripts/lib/coverage_report.sh report ${{ matrix.configure_preset }} ${{ matrix.test_target }}

      - name: Run tests and LLVM coverage report (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          KANO_REPORT_SLUG: ${{ matrix.report_slug }}
          KOG_REPORT_ROOT: ${{ github.workspace }}
          KANO_CPP_TEST_SKILL_ROOT: ${{ github.workspace }}/_tools/kano-cpp-test-skill
        run: |
          export PATH="${{ matrix.llvm_cov_path }}:$PATH"
          bash ./src/cpp/shared/infra/scripts/lib/coverage_report.sh report ${{ matrix.configure_preset }} ${{ matrix.test_target }}

      - name: Generate OpenCppCoverage report (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          KANO_REPORT_SLUG: windows-x64-opencppcoverage
          KOG_REPORT_ROOT: ${{ github.workspace }}
          KOG_OPENCPPCOVERAGE_EXE: ${{ env.KOG_OPENCPPCOVERAGE_EXE }}
          KANO_CPP_TEST_SKILL_ROOT: ${{ github.workspace }}/_tools/kano-cpp-test-skill
        run: |
          bash ./src/cpp/shared/infra/scripts/lib/coverage_report.sh report ${{ matrix.configure_preset }} ${{ matrix.test_target }}

      # ─── Package and Upload ──────────────────────────────────────────────────
      - name: Package normalized reports
        shell: bash
        run: |
          export KOG_REPORT_ROOT="$GITHUB_WORKSPACE"
          export KANO_REPORT_SLUG=package-all
          export KANO_CPP_TEST_SKILL_ROOT="$GITHUB_WORKSPACE/_tools/kano-cpp-test-skill"
          bash ./src/cpp/shared/infra/scripts/lib/package-reports-with-skill.sh

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-${{ matrix.report_slug }}
          path: coverage-reports.tar.gz
          if-no-files-found: warning
          compression-level: 0

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-reports-${{ matrix.report_slug }}
          path: test-reports.tar.gz
          if-no-files-found: warning
          compression-level: 0

  build-windows-msi:
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: windows-latest
    needs: build-native
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.8.14

      - name: Install shared infra Pixi environment
        shell: bash
        run: pixi install --manifest-path src/cpp/shared/infra/pixi.toml

      - name: Build Windows native binary
        shell: bash
        run: pixi run --manifest-path src/cpp/shared/infra/pixi.toml build

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build MSI package
        shell: bash
        run: ./src/wix/scripts/build.sh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kano-git-windows-msi
          path: src/wix/out/*.msi
          if-no-files-found: error
