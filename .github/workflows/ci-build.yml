name: CI Build

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "scripts/**"
      - "pixi.toml"
      - "VERSION"
      - ".github/workflows/ci-build.yml"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "pixi.toml"
      - "VERSION"
      - ".github/workflows/ci-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Native Build Jobs (existing)
  # ─────────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            shell: bash
            build_script: ./src/cpp/build/script/windows/build_windows_ninja_msvc_release.sh
            binary_glob: src/cpp/build/bin/windows-ninja-msvc/release/*
            archive_name: kano-git-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
            build_script: ./src/cpp/build/script/linux/build_linux_ninja_gcc_release.sh
            binary_glob: src/cpp/build/bin/linux-ninja-gcc/release/*
            archive_name: kano-git-linux-x64.tar.gz
          - name: macos-x64
            os: macos-13
            shell: bash
            build_script: ./src/cpp/build/script/macos/build_macos_ninja_clang_x64_release.sh
            binary_glob: src/cpp/build/bin/macos-ninja-clang-x64/release/*
            archive_name: kano-git-macos-x64.tar.gz
          - name: macos-arm64
            os: macos-14
            shell: bash
            build_script: ./src/cpp/build/script/macos/build_macos_ninja_clang_arm64_release.sh
            binary_glob: src/cpp/build/bin/macos-ninja-clang-arm64/release/*
            archive_name: kano-git-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build native binary
        run: ${{ matrix.build_script }}

      - name: Package CI archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ci-assets/root/bin
          cp -R ${{ matrix.binary_glob }} ci-assets/root/bin/
          tar -czf ci-assets/${{ matrix.archive_name }} -C ci-assets/root .

      - name: Package CI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci-assets/root/bin | Out-Null
          Copy-Item -Path src/cpp/build/bin/windows-ninja-msvc/release/* -Destination ci-assets/root/bin -Recurse -Force
          Compress-Archive -Path ci-assets/root/* -DestinationPath ci-assets/${{ matrix.archive_name }} -Force

      - name: Upload native build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kano-git-${{ matrix.name }}
          path: ci-assets/${{ matrix.archive_name }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Coverage Build Jobs (new)
  # ─────────────────────────────────────────────────────────────────────────────
  build-coverage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: coverage-macos-x64
            os: macos-13
            shell: bash
            configure_preset: macos-ninja-clang-coverage
            build_preset: macos-ninja-clang-coverage-debug
            test_target: kano_git_tui_tests
            # macOS uses llvm-cov from Xcode
            llvm_cov_path: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-macos-arm64
            os: macos-14
            shell: bash
            configure_preset: macos-ninja-clang-arm64-coverage
            build_preset: macos-ninja-clang-arm64-coverage-debug
            test_target: kano_git_tui_tests
            llvm_cov_path: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-linux-x64
            os: ubuntu-latest
            shell: bash
            configure_preset: linux-ninja-clang-coverage
            build_preset: linux-ninja-clang-coverage-debug
            test_target: kano_git_tui_tests
            # Linux: install llvm-cov via apt
            llvm_cov_path: /usr/lib/llvm-18/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-windows-x64
            os: windows-latest
            shell: pwsh
            configure_preset: windows-ninja-msvc-coverage
            build_preset: windows-ninja-msvc-coverage-debug
            test_target: kano_git_tui_tests.exe
            # Windows: uses MSVC /PROFILE, processed by Microsoft.CodeCoverage.Console
            coverage_tool: msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ─── Linux: Install LLVM for llvm-cov ───────────────────────────────────
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-tools clang-18

      # ─── macOS: Ensure Xcode tools available ─────────────────────────────────
      - name: Setup Xcode CLI tools (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      # ─── Windows: Install .NET SDK (for Microsoft.CodeCoverage.Console) ───────
      - name: Setup .NET SDK (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ─── Windows: Install Microsoft.CodeCoverage.Console ─────────────────────
      - name: Install Microsoft.CodeCoverage.Console (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          dotnet tool install --global Microsoft.CodeCoverage.Console || true
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"

      # ─── Configure Coverage Build ─────────────────────────────────────────────
      - name: Configure coverage build
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          cd src/cpp
          cmake --preset ${{ matrix.configure_preset }}

      # ─── Build ─────────────────────────────────────────────────────────────
      - name: Build coverage binary
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          cd src/cpp
          cmake --build --preset ${{ matrix.build_preset }}

      # ─── Run Tests (produces .coverage on Windows) ─────────────────────────
      - name: Run tests with coverage (Windows)
        if: runner.os == 'Windows'
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          mkdir -p coverage
          cd src/cpp
          $env:PATH = "$env:USERPROFILE\.dotnet\tools;$env:PATH"
          ./out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }}

      # ─── Run Tests (produces .profraw on Unix) ───────────────────────────────
      - name: Run tests with coverage (Unix)
        if: runner.os != 'Windows'
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
          LLVM_PROFILE_FILE: ${{ github.workspace }}/coverage/${{ matrix.name }}_%m.profraw
        run: |
          mkdir -p coverage
          cd src/cpp
          ./out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }}

      # ─── Windows: Generate HTML Report via Microsoft.CodeCoverage.Console ───
      - name: Generate HTML coverage report (Windows)
        if: runner.os == 'Windows'
        env:
          PATH: "${{ env.USERPROFILE }}\.dotnet\tools;${env:PATH}"
        shell: pwsh
        run: |
          mkdir -p coverage/html/${{ matrix.name }}
          # Find .coverage files
          $coverageFiles = Get-ChildItem -Path . -Filter "*.coverage" -Recurse -File
          if ($coverageFiles) {
            # Merge all .coverage files into one
            $mergedCoverage = "coverage/merged.coverage"
            # Use coverage combine if multiple files, otherwise copy
            if ($coverageFiles.Count -gt 1) {
              coverage combine --input $coverageFiles --output $mergedCoverage
            } else {
              Copy-Item $coverageFiles[0].FullName $mergedCoverage
            }
            # Generate HTML report
            coverage report -i $mergedCoverage --reportdir "coverage/html/${{ matrix.name }}" 2>&1 || true
          }

      # ─── Unix: Generate HTML Report via llvm-cov ─────────────────────────────
      - name: Generate HTML coverage report (Unix)
        if: runner.os != 'Windows'
        env:
          PATH: "${{ matrix.llvm_cov_path }}:$env:PATH"
        run: |
          cd ${{ github.workspace }}
          # Merge profraw files
          ${{ matrix.profdata_merge }} coverage/${{ matrix.name }}_*.profraw -o coverage/${{ matrix.name }}.profdata 2>/dev/null || true
          # Generate HTML
          mkdir -p coverage/html/${{ matrix.name }}
          llvm-cov show \
            ./src/cpp/out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }} \
            -instr-profile=coverage/${{ matrix.name }}.profdata \
            --format=html \
            --output-dir=coverage/html/${{ matrix.name }} \
            --ignore-filename-regex="_deps|catch2|ftxui|thirdparty|build|\.vcpkg" 2>&1 || true

      # ─── Package and Upload ──────────────────────────────────────────────────
      - name: Package coverage report
        run: |
          cd ${{ github.workspace }}
          # Create index that links all platforms
          cat > coverage/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><title>Code Coverage Reports</title></head>
          <body>
          <h1>Code Coverage Reports</h1>
          <ul>
            <li><a href="coverage-macos-x64/index.html">macOS x64</a></li>
            <li><a href="coverage-macos-arm64/index.html">macOS ARM64</a></li>
            <li><a href="coverage-linux-x64/index.html">Linux x64</a></li>
            <li><a href="coverage-windows-x64/index.html">Windows x64</a></li>
          </ul>
          </body></html>
          HTMLEOF
          tar -czf coverage-reports.tar.gz coverage/

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-reports.tar.gz
          if-no-files-found: warning

  build-windows-msi:
    runs-on: windows-latest
    needs: build-native
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows native binary
        shell: bash
        run: ./src/cpp/build/script/windows/build_windows_ninja_msvc_release.sh

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build MSI package
        shell: bash
        run: ./src/wix/scripts/build.sh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kano-git-windows-msi
          path: src/wix/out/*.msi
          if-no-files-found: error
