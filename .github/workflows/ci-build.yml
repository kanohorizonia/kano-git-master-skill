name: CI Build

on:
  push:
    branches: ["main", "master"]
    paths:
      - "src/**"
      - "scripts/**"
      - "pixi.toml"
      - "VERSION"
      - ".github/workflows/ci-build.yml"
  pull_request:
    paths:
      - "src/**"
      - "scripts/**"
      - "pixi.toml"
      - "VERSION"
      - ".github/workflows/ci-build.yml"
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Native Build Jobs (existing)
  # ─────────────────────────────────────────────────────────────────────────────
  build-native:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            shell: bash
            build_script: ./src/cpp/scripts/windows/ninja-msvc-release.sh
            binary_glob: src/cpp/out/bin/windows-ninja-msvc/release/*
            archive_name: kano-git-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
            build_script: ./src/cpp/scripts/linux/ninja-gcc-release.sh
            binary_glob: src/cpp/out/bin/linux-ninja-gcc/release/*
            archive_name: kano-git-linux-x64.tar.gz
          - name: macos-x64
            os: macos-13
            shell: bash
            build_script: ./src/cpp/scripts/macos/ninja-clang-x64-release.sh
            binary_glob: src/cpp/out/bin/macos-ninja-clang-x64/release/*
            archive_name: kano-git-macos-x64.tar.gz
          - name: macos-arm64
            os: macos-14
            shell: bash
            build_script: ./src/cpp/scripts/macos/ninja-clang-arm64-release.sh
            binary_glob: src/cpp/out/bin/macos-ninja-clang-arm64/release/*
            archive_name: kano-git-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build native binary
        run: ${{ matrix.build_script }}

      - name: Package CI archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p ci-assets/root/bin
          cp -R ${{ matrix.binary_glob }} ci-assets/root/bin/
          tar -czf ci-assets/${{ matrix.archive_name }} -C ci-assets/root .

      - name: Package CI archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ci-assets/root/bin | Out-Null
          Copy-Item -Path src/cpp/out/bin/windows-ninja-msvc/release/* -Destination ci-assets/root/bin -Recurse -Force
          Compress-Archive -Path ci-assets/root/* -DestinationPath ci-assets/${{ matrix.archive_name }} -Force

      - name: Upload native build artifact
        uses: actions/upload-artifact@v4
        with:
          name: kano-git-${{ matrix.name }}
          path: ci-assets/${{ matrix.archive_name }}
          if-no-files-found: error

  # ─────────────────────────────────────────────────────────────────────────────
  # Coverage Build Jobs (new)
  # ─────────────────────────────────────────────────────────────────────────────
  build-coverage:
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: coverage-macos-x64
            report_slug: macos-x64
            os: macos-13
            shell: bash
            configure_preset: macos-ninja-clang-coverage
            build_preset: macos-ninja-clang-coverage-debug
            test_target: kano_git_tui_tests
            # macOS uses llvm-cov from Xcode
            llvm_cov_path: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-macos-arm64
            report_slug: macos-arm64
            os: macos-14
            shell: bash
            configure_preset: macos-ninja-clang-arm64-coverage
            build_preset: macos-ninja-clang-arm64-coverage-debug
            test_target: kano_git_tui_tests
            llvm_cov_path: /Applications/Xcode.app/Contents/Developer/Toolchains/XcodeDefault.xctoolchain/usr/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-linux-x64
            report_slug: linux-x64
            os: ubuntu-latest
            shell: bash
            configure_preset: linux-ninja-clang-coverage
            build_preset: linux-ninja-clang-coverage-debug
            test_target: kano_git_tui_tests
            # Linux: install llvm-cov via apt
            llvm_cov_path: /usr/lib/llvm-18/bin
            profdata_merge: llvm-profdata merge
          - name: coverage-windows-x64
            report_slug: windows-x64
            os: windows-latest
            shell: pwsh
            configure_preset: windows-ninja-msvc-coverage
            build_preset: windows-ninja-msvc-coverage-debug
            test_target: kano_git_tui_tests.exe
            # Windows: uses MSVC /PROFILE, processed by Microsoft.CodeCoverage.Console
            coverage_tool: msvc
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # ─── Linux: Install LLVM for llvm-cov ───────────────────────────────────
      - name: Install LLVM (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y llvm-18 llvm-18-tools clang-18

      # ─── macOS: Ensure Xcode tools available ─────────────────────────────────
      - name: Setup Xcode CLI tools (macOS)
        if: runner.os == 'macOS'
        run: |
          sudo xcode-select --switch /Applications/Xcode.app/Contents/Developer

      # ─── Windows: Install .NET SDK (for Microsoft.CodeCoverage.Console) ───────
      - name: Setup .NET SDK (Windows)
        if: runner.os == 'Windows'
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      # ─── Windows: Locate Microsoft.CodeCoverage.Console ──────────────────────
      - name: Locate Microsoft.CodeCoverage.Console (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\2022\Professional\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\2022\Community\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\18\Enterprise\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\18\Professional\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe',
            'C:\Program Files\Microsoft Visual Studio\18\Community\Common7\IDE\Extensions\Microsoft\CodeCoverage.Console\Microsoft.CodeCoverage.Console.exe'
          )
          $tool = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tool) {
            throw 'Microsoft.CodeCoverage.Console.exe not found on runner'
          }
          "KOG_WINDOWS_COVERAGE_TOOL=$tool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Locate or install OpenCppCoverage (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $candidates = @(
            'C:\Program Files\OpenCppCoverage\OpenCppCoverage.exe',
            'C:\tools\OpenCppCoverage\OpenCppCoverage.exe'
          )
          $tool = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          if (-not $tool) {
            choco install OpenCppCoverage -y --no-progress
            $tool = $candidates | Where-Object { Test-Path $_ } | Select-Object -First 1
          }
          if (-not $tool) {
            throw 'OpenCppCoverage.exe not found on runner'
          }
          "KOG_OPENCPPCOVERAGE_EXE=$tool" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      # ─── Configure Coverage Build ─────────────────────────────────────────────
      - name: Configure coverage build
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          cd src/cpp
          cmake --preset ${{ matrix.configure_preset }}

      # ─── Build ─────────────────────────────────────────────────────────────
      - name: Build coverage binary
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          cd src/cpp
          cmake --build --preset ${{ matrix.build_preset }}

      # ─── Run Tests (produces .coverage on Windows) ─────────────────────────
      - name: Run tests with coverage (Windows)
        if: runner.os == 'Windows'
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
        run: |
          New-Item -ItemType Directory -Force -Path coverage/${{ matrix.name }} | Out-Null
          New-Item -ItemType Directory -Force -Path test-results/${{ matrix.report_slug }} | Out-Null
          cd src/cpp
          $tool = $env:KOG_WINDOWS_COVERAGE_TOOL
          $settingsPath = Join-Path ${{ github.workspace }} 'coverage\windows-coverage.config'
          @"
<?xml version="1.0" encoding="utf-8"?>
<Configuration>
  <CodeCoverage>
    <ModulePaths>
      <Include>
        <ModulePath>.*kano_git_tui_tests\.exe$</ModulePath>
        <ModulePath>.*kano-git\.exe$</ModulePath>
        <ModulePath>.*kano-git-tui\.exe$</ModulePath>
      </Include>
      <IncludeDirectories>
        <Directory Recursive="true">${{ github.workspace }}\src\cpp\out\bin\windows-ninja-msvc-coverage\debug</Directory>
      </IncludeDirectories>
    </ModulePaths>
    <SymbolSearchPaths>
      <Path>${{ github.workspace }}\src\cpp\out\bin\windows-ninja-msvc-coverage\debug</Path>
      <Path>${{ github.workspace }}\src\cpp\out\obj\windows-ninja-msvc-coverage\symbols\debug</Path>
    </SymbolSearchPaths>
    <EnableStaticNativeInstrumentation>True</EnableStaticNativeInstrumentation>
    <EnableDynamicNativeInstrumentation>False</EnableDynamicNativeInstrumentation>
    <EnableStaticNativeInstrumentationRestore>True</EnableStaticNativeInstrumentationRestore>
    <IncludeTestAssembly>True</IncludeTestAssembly>
  </CodeCoverage>
</Configuration>
"@ | Set-Content $settingsPath
          ./out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }} --reporter junit --out "${{ github.workspace }}/test-results/${{ matrix.report_slug }}/tests.xml"
          & $tool collect --settings $settingsPath "./out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }}" -o "${{ github.workspace }}/coverage/${{ matrix.name }}/windows.coverage" -f coverage

      # ─── Run Tests (produces .profraw on Unix) ───────────────────────────────
      - name: Run tests with coverage (Unix)
        if: runner.os != 'Windows'
        env:
          KOG_COVERAGE_ROOT: ${{ github.workspace }}/coverage
          LLVM_PROFILE_FILE: ${{ github.workspace }}/coverage/${{ matrix.name }}_%m.profraw
        run: |
          mkdir -p coverage test-results/${{ matrix.report_slug }}
          cd src/cpp
          # Run tests with JUnit output if supported
          # Catch2 supports: --reporter junit
          ./out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }} --reporter junit --out "${{ github.workspace }}/test-results/${{ matrix.report_slug }}/tests.xml" || true

      # ─── Run Tests (produces .profraw on Unix) ───────────────────────────────
      - name: Run tests with coverage (Unix)
        if: runner.os != 'Windows'
        env:
          KOG_CPP_ROOT: ${{ github.workspace }}/src/cpp
          LLVM_PROFILE_FILE: ${{ github.workspace }}/coverage/${{ matrix.name }}_%m.profraw
        run: |
          mkdir -p coverage
          cd src/cpp
          ./out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }}

      # ─── Windows: Export XML/Cobertura via dotnet-coverage ─────────────────
      - name: Generate coverage report (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $tool = $env:KOG_WINDOWS_COVERAGE_TOOL
          $coverageDir = "coverage/${{ matrix.name }}"
          $coverageFile = "$coverageDir/windows.coverage"
          if (Test-Path $coverageFile) {
            & $tool merge $coverageFile -o "$coverageDir/coverage.xml" -f xml
            & $tool merge $coverageFile -o "$coverageDir/coverage.cobertura.xml" -f cobertura
            @(
              'Windows coverage collected via Microsoft.CodeCoverage.Console with MSVC /PROFILE.',
              'If the profiler fails to initialize on a runner, coverage.xml may contain only skipped modules.'
            ) | Set-Content "$coverageDir/summary.txt"
          }

      - name: Generate OpenCppCoverage report (Windows)
        if: runner.os == 'Windows'
        shell: bash
        env:
          KOG_OPENCPPCOVERAGE_EXE: ${{ env.KOG_OPENCPPCOVERAGE_EXE }}
          KOG_COVERAGE_ROOT: ${{ github.workspace }}/coverage/windows-x64-opencppcoverage
        run: |
          bash src/cpp/scripts/windows/ninja-msvc-opencppcoverage-run.sh

      # ─── Unix: Generate HTML Report via llvm-cov ─────────────────────────────
      - name: Generate HTML coverage report (Unix)
        if: runner.os != 'Windows'
        env:
          PATH: "${{ matrix.llvm_cov_path }}:$env:PATH"
        run: |
          cd ${{ github.workspace }}
          # Merge profraw files
          ${{ matrix.profdata_merge }} coverage/${{ matrix.name }}_*.profraw -o coverage/${{ matrix.name }}.profdata 2>/dev/null || true
          # Generate HTML
          mkdir -p coverage/html/${{ matrix.name }}
          llvm-cov show \
            ./src/cpp/out/bin/${{ matrix.build_preset }}/${{ matrix.test_target }} \
            -instr-profile=coverage/${{ matrix.name }}.profdata \
            --format=html \
            --output-dir=coverage/html/${{ matrix.name }} \
            --ignore-filename-regex="_deps|catch2|ftxui|thirdparty|build|\.vcpkg" 2>&1 || true

      # ─── Package and Upload ──────────────────────────────────────────────────
      - name: Package coverage report
        run: |
          cd ${{ github.workspace }}
          # Create index that links all platforms
          cat > coverage/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><title>Code Coverage Reports</title></head>
          <body>
          <h1>Code Coverage Reports</h1>
          <ul>
            <li><a href="macos-x64/index.html">macOS x64</a></li>
            <li><a href="macos-arm64/index.html">macOS ARM64</a></li>
            <li><a href="linux-x64/index.html">Linux x64</a></li>
            <li><a href="windows-x64/index.html">Windows x64</a></li>
            <li><a href="windows-x64-opencppcoverage/index.html">Windows x64 OpenCppCoverage</a></li>
            <li><a href="windows-x64-compare/index.html">Windows x64 Compare</a></li>
          </ul>
          </body></html>
          HTMLEOF
          # Package contents of coverage/ directly (not the directory itself)
          tar -czf coverage-reports.tar.gz -C coverage .

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports
          path: coverage-reports.tar.gz
          if-no-files-found: warning

      # ─── Package test results ───────────────────────────────────────────────
      - name: Package test report
        run: |
          cd ${{ github.workspace }}
          # Create combined test results index
          cat > test-results/index.html << 'HTMLEOF'
          <!DOCTYPE html>
          <html><head><title>Test Reports</title></head>
          <body>
          <h1>Test Reports</h1>
          <ul>
            <li><a href="macos-x64/index.html">macOS x64</a></li>
            <li><a href="macos-arm64/index.html">macOS ARM64</a></li>
            <li><a href="linux-x64/index.html">Linux x64</a></li>
            <li><a href="windows-x64/index.html">Windows x64</a></li>
          </ul>
          </body></html>
          HTMLEOF
          for platform_dir in test-results/*; do
            if [[ -d "$platform_dir" ]] && [[ -f "$platform_dir/tests.xml" ]]; then
              platform_name="$(basename "$platform_dir")"
              cat > "$platform_dir/index.html" <<HTMLEOF
<!DOCTYPE html>
<html>
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1"><title>${platform_name} Test Report</title></head>
<body>
<h1>${platform_name} Test Report</h1>
<p>Raw JUnit XML artifact for this platform:</p>
<p><a href="tests.xml">tests.xml</a></p>
</body>
</html>
HTMLEOF
            fi
          done
          tar -czf test-reports.tar.gz -C test-results .

      - name: Upload test artifact
        uses: actions/upload-artifact@v4
        with:
          name: test-reports
          path: test-reports.tar.gz
          if-no-files-found: warning

  build-windows-msi:
    runs-on: windows-latest
    needs: build-native
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows native binary
        shell: bash
        run: ./src/cpp/scripts/windows/ninja-msvc-release.sh

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Build MSI package
        shell: bash
        run: ./src/wix/scripts/build.sh

      - name: Upload MSI artifact
        uses: actions/upload-artifact@v4
        with:
          name: kano-git-windows-msi
          path: src/wix/out/*.msi
          if-no-files-found: error
