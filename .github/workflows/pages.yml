name: KanoAgentSkills / Publish Pages

run-name: ${{ github.event.inputs.jenkins_build_name && format('Jenkins_{0}_{1}', github.event.inputs.jenkins_stage_name || 'publish-pages', github.event.inputs.jenkins_build_name) || format('GitHub_publish-pages_{0}_{1}_{2}', github.event.repository.name, github.ref_name, github.run_number) }}

on:
  push:
    branches:
      - main
    paths:
      - "docs/**"
      - "src/shell/docs/**"
      - "README.md"
      - "SKILL.md"
      - ".github/workflows/pages.yml"
  workflow_dispatch:
    inputs:
      jenkins_build_name:
        description: Human-readable Jenkins build name for GitHub Actions run lists.
        required: false
        default: ""
        type: string
      jenkins_stage_name:
        description: Jenkins stage/job slug to show in the GitHub Actions run name.
        required: false
        default: publish-pages
        type: string

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skill repo
        uses: actions/checkout@v4

      - name: Read docs build configuration
        id: config
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          config = json.loads(Path('src/shell/docs/config/build.json').read_text(encoding='utf-8'))
          print(f"quartz_version={config['quartz']['version']}")
          print(f"node_version={config['build']['node_version']}")
          PY

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: ${{ steps.config.outputs.quartz_version }}
          path: _site/src/quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}
          cache: npm
          cache-dependency-path: _site/src/quartz/package-lock.json

      - name: Configure gh-pages branch push auth
        env:
          GH_PAGES_TOKEN: ${{ github.token }}
        run: |
          git config --global url."https://x-access-token:${GH_PAGES_TOKEN}@github.com/".insteadOf "https://github.com/"

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # ─────────────────────────────────────────────────────────────────────────
      # Build docs site
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build docs site
        shell: bash
        run: |
          mkdir -p _site/src
          ln -sfn "$PWD" _site/src/raw
          chmod +x src/shell/docs/build-and-deploy.sh
          src/shell/docs/build-and-deploy.sh --ci "$PWD"

      - name: Publish GitHub Pages branch
        env:
          KANO_GITHUB_PAGES_REPO_URL: https://github.com/${{ github.repository }}.git
          KANO_GITHUB_PAGES_BRANCH: gh-pages
          KANO_PROJECT_NAME: kano-git-master-skill
          KANO_RELEASE_TAG: ${{ github.ref_name }}
          KANO_GITHUB_PAGES_COMMIT_MESSAGE: Publish kano-git-master-skill docs from ${{ github.sha }}
        run: bash src/shell/docs/06-publish-github-pages.sh "$PWD/_site/build/public"
