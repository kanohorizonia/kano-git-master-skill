name: CD Docs

on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - "src/cpp/**"
      - "src/shell/docs/**"
      - "scripts/docs/**"
      - ".github/workflows/cd-docs.yml"
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skill repo
        uses: actions/checkout@v4

      - name: Read docs build configuration
        id: config
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          config = json.loads(Path('src/shell/docs/config/build.json').read_text(encoding='utf-8'))
          print(f"quartz_version={config['quartz']['version']}")
          print(f"node_version={config['build']['node_version']}")
          PY

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: ${{ steps.config.outputs.quartz_version }}
          path: _site/src/quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}
          cache: npm
          cache-dependency-path: _site/src/quartz/package-lock.json

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      # ─────────────────────────────────────────────────────────────────────────
      # Build docs site
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build docs site
        shell: bash
        run: |
          mkdir -p _site/src
          ln -sfn "$PWD" _site/src/raw
          chmod +x src/shell/docs/build-and-deploy.sh
          src/shell/docs/build-and-deploy.sh --ci "$PWD"

      - name: Publish GitHub Pages branch
        env:
          KANO_GITHUB_PAGES_REPO_URL: https://github.com/${{ github.repository }}.git
          KANO_GITHUB_PAGES_REPO_USER: x-access-token
          KANO_GITHUB_PAGES_REPO_TOKEN: ${{ github.token }}
          KANO_GITHUB_PAGES_BRANCH: gh-pages
          KANO_PROJECT_NAME: kano-git-master-skill
          KANO_RELEASE_TAG: ${{ github.ref_name }}
          KANO_GITHUB_PAGES_COMMIT_MESSAGE: Publish kano-git-master-skill docs from ${{ github.sha }}
        run: bash src/shell/docs/06-publish-github-pages.sh "$PWD/_site/build/public"
