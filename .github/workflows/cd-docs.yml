name: CD Docs

on:
  push:
    branches: ["main", "master"]
    paths:
      - "docs/**"
      - "src/cpp/**"
      - "src/shell/docs/**"
      - "scripts/docs/**"
      - ".github/workflows/cd-docs.yml"
  workflow_run:
    workflows: ["CI Build"]
    types: [completed]
  workflow_dispatch: {}

permissions:
  contents: read
  actions: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout skill repo (raw_skillrepo)
        uses: actions/checkout@v4
        with:
          path: _site/src/raw_skillrepo

      - name: Read docs build configuration
        id: config
        shell: bash
        run: |
          python - <<'PY' >> "$GITHUB_OUTPUT"
          import json
          from pathlib import Path
          config = json.loads(Path('_site/src/raw_skillrepo/src/shell/docs/config/build.json').read_text(encoding='utf-8'))
          print(f"quartz_version={config['quartz']['version']}")
          print(f"node_version={config['build']['node_version']}")
          PY

      - name: Checkout Quartz
        uses: actions/checkout@v4
        with:
          repository: jackyzha0/quartz
          ref: ${{ steps.config.outputs.quartz_version }}
          path: _site/src/quartz

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ steps.config.outputs.node_version }}
          cache: npm
          cache-dependency-path: _site/src/quartz/package-lock.json

      - name: Install Doxygen and Graphviz
        run: |
          sudo apt-get update
          sudo apt-get install -y doxygen graphviz

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      # ─────────────────────────────────────────────────────────────────────────
      # Download artifacts from CI Build workflow
      # ─────────────────────────────────────────────────────────────────────────
      - name: Download CI Build artifacts
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          mkdir -p _site/src/artifacts _site/src/raw_coverage _site/src/raw_test
          gh run download "${{ github.event.workflow_run.id }}" -R "${{ github.repository }}" -D _site/src/artifacts
          find _site/src/artifacts -type f -name 'coverage-reports*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            tar -xzf "$file" -C _site/src/raw_coverage
          done
          find _site/src/artifacts -type f -name 'test-reports*.tar.gz' -print0 | while IFS= read -r -d '' file; do
            tar -xzf "$file" -C _site/src/raw_test
          done

      - name: List downloaded artifacts
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        shell: bash
        run: |
          echo "Coverage artifacts:"
          ls -la _site/src/raw_coverage/ 2>/dev/null || echo "(none)"
          echo ""
          echo "Test artifacts:"
          ls -la _site/src/raw_test/ 2>/dev/null || echo "(none)"

      # ─────────────────────────────────────────────────────────────────────────
      # Build docs site
      # ─────────────────────────────────────────────────────────────────────────
      - name: Build docs site
        shell: bash
        run: |
          chmod +x _site/src/raw_skillrepo/src/shell/docs/build-and-deploy.sh
          _site/src/raw_skillrepo/src/shell/docs/build-and-deploy.sh --ci "$PWD"

      # ─────────────────────────────────────────────────────────────────────────
      # Copy coverage into public output
      # ─────────────────────────────────────────────────────────────────────────
      - name: Stage coverage report in output
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        shell: bash
        run: |
          COVERAGE_SRC="_site/src/raw_coverage"
          COVERAGE_DST="_site/build/public/coverage"
          if [[ -d "$COVERAGE_SRC" ]] && [[ -n "$(ls -A "$COVERAGE_SRC" 2>/dev/null)" ]]; then
            echo "Copying coverage reports to output..."
            mkdir -p "$COVERAGE_DST"
            cp -r "$COVERAGE_SRC"/* "$COVERAGE_DST/"
            echo "Coverage staged at: $COVERAGE_DST"
            ls -la "$COVERAGE_DST/"
          else
            echo "No coverage artifacts to stage (CI Build may not have produced any)"
          fi

      # ─────────────────────────────────────────────────────────────────────────
      # Copy test reports into public output
      # ─────────────────────────────────────────────────────────────────────────
      - name: Stage test report in output
        if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
        shell: bash
        run: |
          TEST_SRC="_site/src/raw_test"
          TEST_DST="_site/build/public/test"
          if [[ -d "$TEST_SRC" ]] && [[ -n "$(ls -A "$TEST_SRC" 2>/dev/null)" ]]; then
            echo "Copying test reports to output..."
            mkdir -p "$TEST_DST"
            cp -r "$TEST_SRC"/* "$TEST_DST/"
            echo "Test reports staged at: $TEST_DST"
            ls -la "$TEST_DST/"
          else
            echo "No test artifacts to stage (CI Build may not have produced any)"
          fi

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site/build/public

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
