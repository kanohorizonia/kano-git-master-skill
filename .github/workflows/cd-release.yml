name: CD Release

on:
  workflow_dispatch:
    inputs:
      tag_name:
        description: "Tag name to release (for manual runs)"
        required: true
        type: string
      release_reviewed:
        description: "Confirm Jenkins release evidence, artifacts, docs, and tag were reviewed."
        required: true
        default: false
        type: boolean
      draft_release:
        description: "Create the GitHub Release as a draft for final human review."
        required: true
        default: true
        type: boolean

permissions:
  contents: write

concurrency:
  group: release-${{ inputs.tag_name }}
  cancel-in-progress: false

jobs:
  verify-release-version:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Verify tag matches VERSION
        shell: bash
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          bash ./src/shell/release/00-verify-release-version.sh "$PWD" "$TAG_NAME"

      - name: Verify reviewed release evidence
        shell: bash
        run: |
          if [[ "${{ inputs.release_reviewed }}" != "true" ]]; then
            echo "release_reviewed must be true after Jenkins release evidence and artifacts are reviewed." >&2
            exit 2
          fi

  build-release-assets:
    needs: verify-release-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: windows-x64
            os: windows-latest
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/windows-ninja-msvc/release/*
            archive_name: kano-git-windows-x64.zip
          - name: linux-x64
            os: ubuntu-latest
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/linux-ninja-gcc/release/*
            archive_name: kano-git-linux-x64.tar.gz
          - name: macos-x64
            os: macos-13
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/macos-ninja-clang-x64/release/*
            archive_name: kano-git-macos-x64.tar.gz
          - name: macos-arm64
            os: macos-14
            shell: bash
            build_script: ./src/cpp/shared/infra/scripts/self/build.sh
            binary_glob: src/cpp/out/bin/macos-ninja-clang-arm64/release/*
            archive_name: kano-git-macos-arm64.tar.gz
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: ${{ matrix.shell }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
          submodules: recursive

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "8.0.x"

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Build native release asset
        run: ${{ matrix.build_script }}

      - name: Package release asset archive (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p release-assets/root/bin
          cp -R ${{ matrix.binary_glob }} release-assets/root/bin/
          tar -czf release-assets/${{ matrix.archive_name }} -C release-assets/root .

      - name: Package release asset archive (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-assets/root/bin | Out-Null
          Copy-Item -Path src/cpp/out/bin/windows-ninja-msvc/release/* -Destination release-assets/root/bin -Recurse -Force
          Compress-Archive -Path release-assets/root/* -DestinationPath release-assets/${{ matrix.archive_name }} -Force

      - name: Upload release asset bundle
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.name }}
          path: release-assets/${{ matrix.archive_name }}
          if-no-files-found: error

  build-windows-msi:
    runs-on: windows-latest
    needs: verify-release-version
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}
          submodules: recursive

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build Windows native binary
        shell: bash
        run: ./src/cpp/shared/infra/scripts/self/build.sh

      - name: Build MSI package
        shell: bash
        run: ./src/wix/scripts/build.sh

      - name: Upload MSI release asset
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-msi
          path: src/wix/out/*.msi
          if-no-files-found: error

  publish-github-release:
    runs-on: ubuntu-latest
    needs:
      - build-release-assets
      - build-windows-msi
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Generate release notes
        id: notes
        shell: bash
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          NOTES_FILE="release-notes.md"
          bash ./src/shell/release/01-generate-release-notes.sh "$PWD" "$TAG_NAME" "${{ github.repository }}" "$PWD/dist" "$NOTES_FILE"
          echo "notes_file=$NOTES_FILE" >> "$GITHUB_OUTPUT"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag_name }}
          body_path: ${{ steps.notes.outputs.notes_file }}
          files: dist/**/*
          draft: ${{ inputs.draft_release }}
          prerelease: false

  publish-winget-skeleton:
    runs-on: ubuntu-latest
    needs: publish-github-release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Placeholder winget publishing step
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          mkdir -p out/winget
          bash ./src/shell/release/02-generate-winget-skeleton.sh "$PWD" "$TAG_NAME" "${{ github.repository }}" "$PWD/dist" "$PWD/out/winget"

      - name: Upload winget skeleton artifact
        uses: actions/upload-artifact@v4
        with:
          name: winget-skeleton
          path: out/winget/*
          if-no-files-found: error

  publish-homebrew-skeleton:
    runs-on: ubuntu-latest
    needs: publish-github-release
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.tag_name }}

      - name: Download all release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Placeholder Homebrew publishing step
        run: |
          TAG_NAME="${{ inputs.tag_name }}"
          mkdir -p out/homebrew
          bash ./src/shell/release/03-generate-homebrew-skeleton.sh "$PWD" "$TAG_NAME" "${{ github.repository }}" "$PWD/dist" "$PWD/out/homebrew"

      - name: Upload Homebrew skeleton artifact
        uses: actions/upload-artifact@v4
        with:
          name: homebrew-skeleton
          path: out/homebrew/*
          if-no-files-found: error
