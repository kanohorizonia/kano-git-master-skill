# kano-git layered config defaults
#
# Load order matches git-style override precedence:
#   1. system: this file (<skill-root>/.kano/kog_config.toml)
#   2. global: ~/.kano/kog_config.toml
#   3. local:  <workspace>/.kano/kog_config.toml
# Later files override earlier ones.

# Effective default AI model selection.
#
# This is consulted when a command does not receive an explicit `--ai-model`
# and there is no remembered provider model override.
#
# Available values:
# - "auto"
#   Use the provider's auto-selection behavior. For Copilot, this means the
#   `[ai.model.auto]` ladder below.
# - "provider-default"
#   Use the provider's built-in recommended fixed default model.
# - "provider/model"
#   Provider-qualified exact model reference, for example:
#   `copilot/gpt-5.4`
# - "model"
#   Bare model name for the active provider, for example:
#   `gpt-5.4`
#
# Notes:
# - Legacy alias `default` is still accepted and normalized to
#   `provider-default`.
# - If a `provider/model` entry names a different provider than the active one,
#   it is ignored for that provider.
[ai.model]
selection = "auto"

# Auto model selection policy for AI providers.
[ai.model.auto]
change_thresholds = [5, 40, 100]
models = [
    "copilot/gpt-5-mini",                  # <= 5 changes (minimal)
    "copilot/claude-haiku-4.5",            # 6-40 changes (standard)
    "copilot/gpt-5.4?reasoning=medium",    # 41-100 changes (complex/large)
    "copilot/gpt-5.4?reasoning=high"       # > 100 changes (massive re-architecting)
]

# Plan AI behavior defaults.
[plan.ai]
commit_generation_mode = "single"
# When true, AI-assisted commit flows must fail instead of silently falling back
# to deterministic/native commit messages or seeded plan repair.
require_success = false

# Workspace discovery defaults.
#
# `kog status` and other workspace-aware commands merge these external roots
# with the normal registered-workspace scan. This keeps nearby skill repos such
# as `~/.agents/skills/*` visible without requiring them to be submodules of the
# current workspace.
#[workspace.external]
# roots = ["~/.agents/skills"]
#inherit = true

# Native self-build behavior.
#
# Compiler launcher selection for local/self builds.
#
# Available values:
# - "auto"
#   Try to detect a supported launcher from PATH. Current preference order is
#   `ccache` first, then `sccache`.
# - "none"
#   Disable compiler launcher usage.
# - "ccache"
#   Require `ccache` to be available and use it explicitly.
# - "sccache"
#   Require `sccache` to be available and use it explicitly.
# - "<program-or-absolute-path>"
#   Use an explicit launcher binary name or full path if your workflow needs a
#   non-default wrapper.
#
# Notes:
# - If `auto` is selected and no supported launcher is found, build falls back
#   to a normal non-launcher compile path.
# - `ccache` / `sccache` are mostly a local iteration optimization. They should
#   not change build output semantics.
[self]
compiler_launcher = "auto"

[log]
remote_preview_count = 3

# Windows MSVC toolchain preference for self-build.
#
# Behavior:
# - If set to "installed-latest", use the newest MSVC toolset already installed
#   on this machine.
# - If set to "channel-latest", `install-prereq` tries to sync/install the newest
#   MSVC toolset available from the active Visual Studio channel, and self-build
#   then uses the newest installed version.
# - If the exact preferred toolset is installed, use it.
# - If it is not installed, self-build may fall forward to a newer installed
#   toolset version.
# - Falling back to an older toolset is not allowed.
#
# Example:
[toolchain]
msvc_preferred_version = "14.44.35207"
# or
# msvc_preferred_version = "installed-latest"
# or
# msvc_preferred_version = "channel-latest"
